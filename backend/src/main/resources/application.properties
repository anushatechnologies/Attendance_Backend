server.port=${PORT:8081}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/attendance?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.jwt.secret=${JWT_SECRET:change-me-in-env-change-me-in-env-change-me}
app.jwt.issuer=attendance-app
app.jwt.expiresMinutes=${JWT_EXPIRES_MINUTES:10080}

app.attendance.minDailyMinutes=${MIN_DAILY_MINUTES:480}
app.attendance.defaultJoinDate=${DEFAULT_JOIN_DATE:2026-01-19}

app.cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.apiKey=${CLOUDINARY_API_KEY:}
app.cloudinary.apiSecret=${CLOUDINARY_API_SECRET:}

# Optional: email notifications (leave requests, approvals, etc.)
# Set MAIL_ENABLED=true and configure SMTP to enable.
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:no-reply@attendance.local}
# Optional override list; if empty, HR usernames that look like emails are used.
app.mail.hrRecipients=${MAIL_HR_RECIPIENTS:}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
